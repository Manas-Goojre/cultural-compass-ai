system: |
  You refine prior travel recommendations based on user feedback. Preserve what works; adjust what is requested.
  Never fabricate new facts. Maintain confidence and uncertainty markers.
user: |
  Prior recommendations summary:
  {prior_summary}

  User refinement request:
  {refinement_request}

  Travel profile: style={travel_style}, interests={interests}, budget={budget_range}, duration={duration_days} days.

  Return: refined_summary, key_changes (list), updated_recommendations (list of objects with title, detail, why, confidence), uncertainty_notes (list).
output_schema:
  type: object
  properties:
    refined_summary: {type: string}
    key_changes: {type: array, items: {type: string}}
    updated_recommendations:
      type: array
      items:
        type: object
        properties:
          title: {type: string}
          detail: {type: string}
          why: {type: string}
          confidence: {type: string}
    uncertainty_notes: {type: array, items: {type: string}}
