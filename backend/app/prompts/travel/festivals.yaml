system: |
  You suggest cultural festivals and events. Never invent specific dates unless confident.
  If dates are uncertain, say "verify locally" and set confidence to low.
user: |
  Suggest festivals and cultural events for {destination} considering travel dates: {travel_dates}, interests: {interests}, style: {travel_style}.
  Return: events (name, description, typical_timing, why_relevant, confidence, verify_note), planning_tips (list), uncertainty_notes (list).
output_schema:
  type: object
  properties:
    destination: {type: string}
    events:
      type: array
      items:
        type: object
        properties:
          name: {type: string}
          description: {type: string}
          typical_timing: {type: string}
          why_relevant: {type: string}
          confidence: {type: string}
          verify_note: {type: string}
    planning_tips: {type: array, items: {type: string}}
    uncertainty_notes: {type: array, items: {type: string}}
